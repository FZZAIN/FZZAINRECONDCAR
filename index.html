<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FZZAIN RECOND CAR</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

.container{max-width:850px;margin:auto;padding:20px}

h2{text-align:center;}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

.btn-group{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}

.btn-group button{
flex:1;
padding:8px;
border:none;
border-radius:6px;
background:#333;
color:white;
cursor:pointer;
}

.btn-group button:hover{background:#25d366}

.card{
background:#1a1a1a;
padding:15px;
margin:12px 0;
border-radius:12px;
}

.card img{width:100%;border-radius:10px}

button.action{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#25d366;
color:white;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>🚗 FZZAIN RECOND CAR</h2>

<input id="search" placeholder="Cari kereta..." onkeyup="loadCars()">

<div class="btn-group">
<button onclick="setBrand('all')">ALL</button>
<button onclick="setBrand('Mercedes')">Mercedes</button>
<button onclick="setBrand('BMW')">BMW</button>
<button onclick="setBrand('Toyota')">Toyota</button>
</div>

<div id="list"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="firebase.js"></script>

<script>

let phone="601136756741";
let currentBrand="all";

function setBrand(b){currentBrand=b;loadCars();}

function loadCars(){

let list=document.getElementById("list");
let keyword=document.getElementById("search").value.toLowerCase();

db.collection("cars").onSnapshot(s=>{

list.innerHTML="";

s.forEach(doc=>{
let c=doc.data();

if((currentBrand=="all"||c.brand==currentBrand) && c.name.toLowerCase().includes(keyword)){

list.innerHTML+=`
<div class="card">
<img src="${c.image}">
<h2>RM ${c.price}</h2>
<h3>${c.name}</h3>

<p>${c.year} | ${c.mileage}</p>

<button class="action" onclick="wa('${c.name}','${c.price}')">
APPLY LOAN
</button>

</div>`;
}

});

});

}

function wa(name,price){
window.location="https://wa.me/"+phone+"?text="+encodeURIComponent("Nak loan "+name+" RM"+price);
}

loadCars();

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FZZAIN RECOND CAR</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

.container{
max-width:850px;
margin:auto;
padding:20px;
}

h2{text-align:center;}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
}

h4{margin:10px 0 5px;}

.btn-group{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-bottom:10px;
}

.btn-group button{
flex:1;
padding:8px;
border:none;
border-radius:6px;
background:#333;
color:white;
cursor:pointer;
font-size:12px;
}

.btn-group button:hover{
background:#25d366;
}

.card{
background:#1a1a1a;
padding:15px;
margin:12px 0;
border-radius:12px;
transition:0.3s;
}

.card:hover{transform:scale(1.02);}

.card img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

.card h2{
font-size:28px;
color:#25d366;
margin:5px 0;
}

.card h3{font-size:20px;margin:5px 0;}

.card p{margin:4px 0;color:#ddd;}

button.action{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#25d366,#1fa855);
color:white;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>🚗 FZZAIN RECOND CAR</h2>

<input id="search" placeholder="🔍 Cari kereta..." onkeyup="loadCars()">

<h4>🏷 Brand</h4>
<div class="btn-group">
<button onclick="setBrand('all')">ALL</button>
<button onclick="setBrand('Mercedes')">Mercedes</button>
<button onclick="setBrand('BMW')">BMW</button>
<button onclick="setBrand('Toyota')">Toyota</button>
<button onclick="setBrand('Honda')">Honda</button>
<button onclick="setBrand('Nissan')">Nissan</button>
<button onclick="setBrand('Mazda')">Mazda</button>
<button onclick="setBrand('Porsche')">Porsche</button>
</div>

<h4>📅 Tahun</h4>
<div class="btn-group">
<button onclick="setYear('all')">ALL</button>
<button onclick="setYear('2026')">2026</button>
<button onclick="setYear('2025')">2025</button>
<button onclick="setYear('2024')">2024</button>
<button onclick="setYear('2023')">2023</button>
<button onclick="setYear('2022')">2022</button>
<button onclick="setYear('2021')">2021</button>
<button onclick="setYear('2020')">2020</button>
</div>

<div id="list"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="firebase.js"></script>

<script>

let phone="601136756741";
let currentBrand="all";
let currentYear="all";

function setBrand(b){currentBrand=b;loadCars();}
function setYear(y){currentYear=y;loadCars();}

/* 🔥 FIX: FIREBASE INSTEAD LOCALSTORAGE */
function loadCars(){

let list=document.getElementById("list");
let keyword=document.getElementById("search").value.toLowerCase();

db.collection("cars").onSnapshot(snapshot=>{

list.innerHTML="";

snapshot.forEach(doc=>{
let c=doc.data();

if((currentBrand=="all"||c.brand==currentBrand) && c.name.toLowerCase().includes(keyword)){

list.innerHTML+=`
<div class="card">

<img src="${c.image}">

<h2>RM ${c.price}</h2>
<h3>${c.name}</h3>

<p>📅 Tahun: ${c.year}</p>
<p>📊 Mileage: ${c.mileage}</p>
<p>🏷 Brand: ${c.brand}</p>

<button class="action" onclick="applyLoan('${c.name}','${c.price}')">
📲 APPLY LOAN WHATSAPP
</button>

</div>`;
}

});

});

}

function applyLoan(model,price){

let name=prompt("Nama anda:");
if(!name)return;

let salary=prompt("Gaji:");
if(!salary)return;

let msg=`
🚗 ${model}
💰 RM${price}
👤 ${name}
💼 RM${salary}
`;

window.location="https://wa.me/"+phone+"?text="+encodeURIComponent(msg);

}

loadCars();

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ADMIN PANEL</title>

<style>
body{background:#111;color:white;font-family:Arial}
.container{max-width:800px;margin:auto;padding:20px}

input,button{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
}

button{background:#25d366;font-weight:bold}

.card{
background:#1a1a1a;
padding:10px;
margin:10px 0;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🔐 ADMIN LOGIN</h2>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">LOGIN</button>

<div id="panel" style="display:none">

<h2>ADD CAR</h2>

<input id="name" placeholder="Nama">
<input id="price" placeholder="Harga">
<input id="year" placeholder="Tahun">
<input id="mileage" placeholder="Mileage">
<input id="brand" placeholder="Brand">

<input type="file" id="img">

<button onclick="addCar()">UPLOAD CAR</button>

<h2>STOCK</h2>
<div id="list"></div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script src="firebase.js"></script>

<script>

/* ADMIN LOGIN */
function login(){

let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;

auth.signInWithEmailAndPassword(email,pass)
.then(()=>{

if(email==="fariszain97@gmail.com"){
document.getElementById("panel").style.display="block";
load();
}else{
alert("NOT ADMIN");
auth.signOut();
}

});

}

/* ADD CAR */
function addCar(){

let file=document.getElementById("img").files[0];
let ref=storage.ref("cars/"+file.name);

ref.put(file).then(()=>{

ref.getDownloadURL().then(url=>{

db.collection("cars").add({
name:document.getElementById("name").value,
price:document.getElementById("price").value,
year:document.getElementById("year").value,
mileage:document.getElementById("mileage").value,
brand:document.getElementById("brand").value,
image:url
});

alert("SAVED");

});

});

}

/* LOAD STOCK */
function load(){

db.collection("cars").onSnapshot(s=>{

let html="";

s.forEach(d=>{
let c=d.data();

html+=`
<div class="card">
${c.name} - RM${c.price}
</div>`;

});

document.getElementById("list").innerHTML=html;

});

}

</script>

</body>
</html>
